name: fleet-local

volumes:
  mysql:
  redis:
  data:
  logs:
  vulndb:
  caddy_data:
  caddy_config:

services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:8.0.44}
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fleet}
      MYSQL_USER: ${MYSQL_USER:-fleet}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
    volumes:
      - mysql:/var/lib/mysql
    command: ["mysqld", "--max_allowed_packet=${MYSQL_MAX_ALLOWED_PACKET:-536870912}", "--binlog-expire-logs-seconds=${MYSQL_BINLOG_EXPIRE_SECONDS:-86400}"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: ${REDIS_IMAGE:-redis:6.2}
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  fleet-init:
    image: ${ALPINE_IMAGE:-alpine:3.23.4}
    volumes:
      - logs:/logs
      - data:/data
      - vulndb:/vulndb
    command: ["sh", "-c", "chown -R 100:101 /logs /data /vulndb"]

  fleet:
    image: ${FLEET_IMAGE_REPOSITORY:-thinkhome/fleet}:${FLEET_IMAGE_TAG}
    build:
      context: .
      dockerfile: Dockerfile.local
      args:
        FLEET_VERSION: ${FLEET_IMAGE_TAG}
        FLEET_REVISION: ${FLEET_REVISION:-unknown}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      fleet-init:
        condition: service_completed_successfully
    command: ["sh", "-c", "/usr/bin/fleet prepare db --no-prompt && exec /usr/bin/fleet serve"]
    environment:
      FLEET_REDIS_ADDRESS: redis:6379
      FLEET_MYSQL_ADDRESS: mysql:3306
      FLEET_MYSQL_DATABASE: ${MYSQL_DATABASE:-fleet}
      FLEET_MYSQL_USERNAME: ${MYSQL_USER:-fleet}
      FLEET_MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
      FLEET_SERVER_ADDRESS: ${FLEET_SERVER_ADDRESS:-0.0.0.0:1337}
      FLEET_SERVER_TLS: ${FLEET_SERVER_TLS:-false}
      FLEET_SERVER_TRUSTED_PROXIES: ${FLEET_SERVER_TRUSTED_PROXIES:-1}
      FLEET_SERVER_PRIVATE_KEY: ${FLEET_SERVER_PRIVATE_KEY:?set FLEET_SERVER_PRIVATE_KEY in .env}
      FLEET_SERVER_MAX_INSTALLER_SIZE: ${FLEET_SERVER_MAX_INSTALLER_SIZE:-10GiB}
      FLEET_LOGGING_JSON: ${FLEET_LOGGING_JSON:-true}
      FLEET_LOGGING_DEBUG: ${FLEET_LOGGING_DEBUG:-false}
      FLEET_VULNERABILITIES_CURRENT_INSTANCE_CHECKS: ${FLEET_VULNERABILITIES_CURRENT_INSTANCE_CHECKS:-yes}
      FLEET_VULNERABILITIES_DATABASES_PATH: ${FLEET_VULNERABILITIES_DATABASES_PATH:-/vulndb}
      FLEET_VULNERABILITIES_PERIODICITY: ${FLEET_VULNERABILITIES_PERIODICITY:-1h}
      FLEET_LICENSE_KEY: ${FLEET_LICENSE_KEY:-}
      FLEET_S3_SOFTWARE_INSTALLERS_BUCKET: ${FLEET_S3_SOFTWARE_INSTALLERS_BUCKET:-}
      FLEET_S3_SOFTWARE_INSTALLERS_PREFIX: ${FLEET_S3_SOFTWARE_INSTALLERS_PREFIX:-}
      FLEET_S3_SOFTWARE_INSTALLERS_ACCESS_KEY_ID: ${FLEET_S3_SOFTWARE_INSTALLERS_ACCESS_KEY_ID:-}
      FLEET_S3_SOFTWARE_INSTALLERS_SECRET_ACCESS_KEY: ${FLEET_S3_SOFTWARE_INSTALLERS_SECRET_ACCESS_KEY:-}
      FLEET_S3_SOFTWARE_INSTALLERS_REGION: ${FLEET_S3_SOFTWARE_INSTALLERS_REGION:-}
      FLEET_S3_SOFTWARE_INSTALLERS_ENDPOINT_URL: ${FLEET_S3_SOFTWARE_INSTALLERS_ENDPOINT_URL:-}
      FLEET_S3_SOFTWARE_INSTALLERS_FORCE_S3_PATH_STYLE: ${FLEET_S3_SOFTWARE_INSTALLERS_FORCE_S3_PATH_STYLE:-false}
    expose:
      - "1337"
    volumes:
      - data:/fleet
      - logs:/logs
      - vulndb:/vulndb
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:1337/healthz"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  caddy:
    image: ${CADDY_IMAGE:-caddy:2.11.4-alpine}
    depends_on:
      fleet:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      FLEET_DOMAIN: ${FLEET_DOMAIN:-fleet.thinkhome.org}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
