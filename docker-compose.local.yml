name: fleet-local

volumes:
  mysql:
  redis:
  data:
  logs:
  vulndb:
  caddy_data:
  caddy_config:

services:
  mysql:
    image: mysql:8.0.44
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: fleet
      MYSQL_USER: fleet
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql:/var/lib/mysql
    command: ["mysqld", "--max_allowed_packet=536870912", "--binlog-expire-logs-seconds=86400"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ufleet -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:6.2
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  fleet-init:
    image: alpine:3.23.4
    volumes:
      - logs:/logs
      - data:/data
      - vulndb:/vulndb
    command: ["sh", "-c", "chown -R 100:101 /logs /data /vulndb"]

  fleet:
    image: thinkhome/fleet:${FLEET_IMAGE_TAG}
    build:
      context: .
      dockerfile: Dockerfile.local
      args:
        FLEET_VERSION: ${FLEET_IMAGE_TAG}
        FLEET_REVISION: ${FLEET_REVISION}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      fleet-init:
        condition: service_completed_successfully
    command: ["sh", "-c", "/usr/bin/fleet prepare db --no-prompt && exec /usr/bin/fleet serve"]
    environment:
      FLEET_REDIS_ADDRESS: redis:6379
      FLEET_MYSQL_ADDRESS: mysql:3306
      FLEET_MYSQL_DATABASE: fleet
      FLEET_MYSQL_USERNAME: fleet
      FLEET_MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      FLEET_SERVER_ADDRESS: 0.0.0.0:1337
      FLEET_SERVER_TLS: "false"
      FLEET_SERVER_PRIVATE_KEY: ${FLEET_SERVER_PRIVATE_KEY}
      FLEET_LOGGING_JSON: "true"
      FLEET_VULNERABILITIES_CURRENT_INSTANCE_CHECKS: "yes"
      FLEET_VULNERABILITIES_DATABASES_PATH: /vulndb
      FLEET_VULNERABILITIES_PERIODICITY: 1h
    expose:
      - "1337"
    volumes:
      - data:/fleet
      - logs:/logs
      - vulndb:/vulndb
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:1337/healthz"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  caddy:
    image: caddy:2.11.4-alpine
    depends_on:
      fleet:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
